<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Project Viewer</title>
</head>
<body class="flex justify-center items-center h-screen bg-gray-100">
    <div class="bg-black text-white p-8 rounded-lg shadow-lg h-3/5 w-3/5">
        <div class="font-mono text-xl leading-normal p-0 m-0">
            <span class="text-green-400">username@host</span>:<span class="text-blue-400">~</span>$ <span class="text-white">_</span>
        </div>
    </div>
    <div class="bg-slate-500 h-3/5 w-1/6">
      <div>
        <label class="block mb-2">Languages:</label>
        <label class="flex items-center mb-2">
            <input type="checkbox" class="mr-2" value="java-filter"> Java
        </label>
        <label class="flex items-center mb-2">
            <input type="checkbox" class="mr-2" value="c-filter"> C
        </label>
        <label class="flex items-center mb-2">
            <input type="checkbox" class="mr-2" value="cpp-filter"> C++
        </label>
      </div>

      <label for="filterDropdown" class="block mt-4 mb-2">Projects:</label>
      <select id="filterDropdown" class="bg-white border border-gray-300 p-2 rounded-md mb-4">
        <option value="ip-hw1" class="c-project">Vending Machine (C)</option>
        <option value="ip-hw3" class="c-project">Maze on the CL (C)</option>
        <option value="ip-midterm" class="c-project">Photoshop on the CL (C)</option>
      </select>
    </div>
</body>
</html>
