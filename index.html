<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Oh My Portfolio</title>
  </head>
  <body>
    <header class="sticky">
      <nav id="main-nav">
        <div id="logo-div" class="nav-root-component">
          <a href="/" id="logo-span">Oh(n)</a>
        </div>
        <ul id="nav-list-container">
          <li><a href="#about-section" class="page-link">About</a></li>
          <li><a href="#projects-section" class="page-link">Projects</a></li>
        </ul>
        <ul id="svg-list-container">
          <li id="github-svg-li">
            <a
              id="github-svg-anchor"
              href="https://github.com/bathan1"
              target="_blank"
              ><img
                id="github-svg"
                class="social-link-svg"
                src="./assets/svgs/github-mark-white.svg"
            /></a>
          </li>
          <li>
            <a
              href="https://www.linkedin.com/in/nathan-oh-a90b19232/"
              target="_blank"
              ><img
                id="linkedin-svg"
                class="social-link-svg"
                src="./assets/svgs/linkedin.svg"
            /></a>
          </li>
        </ul>
      </nav>
    </header>

    <main id="main-content">
      <div id="top-layer" class="spacer layer1"></div>
      <section id="hero-section" class="main-section">
        <h1>Hi, my name is Nathan,</h1>
        <h3>and I am (not) a 10x developer.</h3>
        <p>Scroll down to learn more about me!</p>

        <svg
          id="visual"
          class="blob-motion"
          viewBox="0 0 960 300"
          width="960"
          height="300"
          xmlns="http://www.w3.org/2000/svg"
          xmlns:xlink="http://www.w3.org/1999/xlink"
          version="1.1"
        >
          <g transform="translate(462.88527611618196 137.7684692274528)">
            <path
              id="blob1"
              d="M76.4 -69.9C101.4 -51.4 125.7 -25.7 121.7 -4C117.7 17.7 85.4 35.4 60.4 59C35.4 82.7 17.7 112.3 -8.2 120.6C-34.2 128.8 -68.4 115.7 -81.2 92C-94 68.4 -85.5 34.2 -80.1 5.4C-74.7 -23.3 -72.3 -46.7 -59.5 -65.2C-46.7 -83.7 -23.3 -97.3 1.2 -98.5C25.7 -99.7 51.4 -88.4 76.4 -69.9"
              fill="#1f1533"
            ></path>
          </g>
          <g transform="translate(486.06941770186154 171.48753607312685)" style="visibility: hidden">
            <path
              id="blob2"
              d="M53.5 -63.7C68.3 -38.7 78.7 -19.3 85.4 6.7C92.1 32.8 95.2 65.5 80.4 78C65.5 90.5 32.8 82.8 5.5 77.2C-21.7 71.7 -43.4 68.4 -61.7 55.9C-80 43.4 -95 21.7 -100.7 -5.7C-106.3 -33 -102.7 -66 -84.3 -91C-66 -116 -33 -133 -6.8 -126.2C19.3 -119.3 38.7 -88.7 53.5 -63.7"
              fill="#1f1533"
            ></path>
          </g>
        </svg>
      </section>
      <div class="spacer layer1 flip"></div>

      <section id="about-section" class="main-section">
        <div class="about-card" id="left-about-card">
          <div id="terminal-wrapper" class="gradient-rounded-border">
            <p class="terminal-text">oh-my-portfolio ~$</p>
            <p class="terminal-text" id="terminal-commander"></p>
          </div>
        </div>
        <div class="about-card" id="right-about-card">
          <div id="info-card-container">
            <div class="info-card gradient-rounded-border hidden"></div>
            <div class="info-card gradient-rounded-border hidden"></div>
            <div class="info-card gradient-rounded-border hidden"></div>
          </div>
        </div>
      </section>

      <section id="projects-section" class="projects-container main-section">
        <div id="featured-projects-container">
          <div class="project-card featured-project-card gradient-rounded-border"></div>
          <div class="project-card featured-project-card gradient-rounded-border"></div>
          <div class="project-card featured-project-card gradient-rounded-border"></div>
        </div>
        <div id="side-projects-main-wrapper">
          <div id="side-projects-left-grid" class="gradient-rounded-border"></div>
          <div id="side-projects-flex-container">
            <div class="project-card side-project-card gradient-rounded-border"></div>
            <div class="project-card side-project-card gradient-rounded-border" ></div>
            <div class="project-card side-project-card gradient-rounded-border"></div>
          </div>
        </div>
      </section>
      <footer id="footer"></footer>
    </main>

    <script defer src="./src/main.js" type="module"></script>
  </body>
</html>
